# tmuxinator configuration for omniwerx-io project
# Start with: tmuxinator start omniwerx-io (or: mux start omniwerx-io)

name: omniwerx-io
root: ~/dev/omniwerx-io/

windows:
  - terminal:
      layout: even-horizontal
      panes:
        -  # empty pane for commands
        -  # dev server
  - editor:
      panes:
        - nvim
  - agent:
      panes:
        - pi
  - diff:
      panes:
        - hunk diff
